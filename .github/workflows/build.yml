name: Build AUR Packages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-aur-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [bootupd, bootc, morewaita-icon-theme]
    steps:
      - uses: actions/checkout@v4
      - name: Get AUR Version
        id: aur-version
        run: |
          VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=${{ matrix.package }}" | jq -r '.results[] | "\(.Name)-\(.Version)"')
          echo "key=$VERSION" >> $GITHUB_OUTPUT
      - name: Cache AUR package
        id: cache-aur
        uses: actions/cache@v4
        with:
          path: aur-out/
          key: ${{ runner.os }}-aur-${{ steps.aur-version.outputs.key }}
      - name: Cache Pacman AUR Build
        if: steps.cache-aur.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: pacman-aur-cache/
          key: ${{ runner.os }}-pacman-aur-v1
          restore-keys: |
            ${{ runner.os }}-pacman-aur-
      - name: Cache Cargo AUR
        uses: actions/cache@v4
        with:
          path: cargo-aur-cache-${{ matrix.package }}/
          key: ${{ runner.os }}-cargo-aur-${{ matrix.package }}-${{ steps.aur-version.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-cargo-aur-${{ matrix.package }}-
      - name: Prepare Cache Dir
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p pacman-aur-cache cargo-aur-cache-${{ matrix.package }}
      - name: Build AUR package in Arch container
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p aur-out
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-aur-cache:/var/cache/pacman/pkg -v $(pwd)/cargo-aur-cache-${{ matrix.package }}:/home/builduser/.cargo -w /work docker.io/archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel git sudo rust
            useradd -m builduser || true
            chown -R builduser:builduser /home/builduser
            passwd -d builduser
            echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser
            
            sudo -u builduser bash -c '
              cd ~
              git clone https://aur.archlinux.org/${{ matrix.package }}.git
              cd ${{ matrix.package }} && makepkg -s --noconfirm
            '
            cp /home/builduser/${{ matrix.package }}/*.pkg.tar.zst /work/aur-out/
          "
          sudo chown -R $USER:$USER aur-out/ pacman-aur-cache/ cargo-aur-cache-${{ matrix.package }}/
      - name: Upload AUR package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aur-package-${{ matrix.package }}
          path: aur-out/*.pkg.tar.zst

  build-local-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [alga, ark-system-tweaks]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Pacman Local Build
        uses: actions/cache@v4
        with:
          path: pacman-local-cache/
          key: ${{ runner.os }}-pacman-local-v1
      - name: Cache Cargo Local Build
        uses: actions/cache@v4
        with:
          path: cargo-local-cache-${{ matrix.package }}/
          key: ${{ runner.os }}-cargo-local-${{ matrix.package }}-v1
      - name: Prepare Cache Dir
        run: |
          mkdir -p pacman-local-cache cargo-local-cache-${{ matrix.package }} aur-out
      - name: Build Local package in Arch container
        run: |
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-local-cache:/var/cache/pacman/pkg -v $(pwd)/cargo-local-cache-${{ matrix.package }}:/home/builduser/.cargo -w /work docker.io/archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel git sudo rust
            useradd -m builduser || true
            chown -R builduser:builduser /home/builduser
            passwd -d builduser
            echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser

            sudo -u builduser bash -c '
              cd /work/${{ matrix.package }}
              makepkg -s --noconfirm
            '
            cp /work/${{ matrix.package }}/*.pkg.tar.zst /work/aur-out/
          "
          sudo chown -R $USER:$USER aur-out/ pacman-local-cache/ cargo-local-cache-${{ matrix.package }}/
      - name: Upload Local package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-package-${{ matrix.package }}
          path: aur-out/*.pkg.tar.zst

  release:
    needs: [build-aur-packages, build-local-packages]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download AUR packages
        uses: actions/download-artifact@v4
        with:
          pattern: aur-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Download Local packages
        uses: actions/download-artifact@v4
        with:
          pattern: local-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Pre-built AUR Packages"
          body: |
            Automated build for `bootc` and `bootupd` from AUR.
          files: aur-packages/*.pkg.tar.zst
          prerelease: true
          make_latest: true
