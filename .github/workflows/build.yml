name: Build AUR Packages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-aur-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [bootupd, bootc, morewaita-icon-theme, pods, distroshelf, starship, fastfetch, scrcpy, android-tools, nix, distrobox, plymouth, zram-generator, github-cli, gnome-backgrounds, base-devel, gnome-disk-utility-git]
    steps:
      - uses: actions/checkout@v4
      - name: Get AUR Version
        id: aur-version
        run: |
          VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=${{ matrix.package }}" | jq -r '.results[] | "\(.Name)-\(.Version)"')
          echo "key=$VERSION" >> $GITHUB_OUTPUT
      - name: Cache AUR package
        id: cache-aur
        uses: actions/cache@v4
        with:
          path: aur-out/
          key: ${{ runner.os }}-aur-v4-${{ matrix.package }}-${{ steps.aur-version.outputs.key || 'official' }}
      - name: Cache Pacman AUR Build
        if: steps.cache-aur.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: pacman-aur-cache/
          key: ${{ runner.os }}-pacman-aur-v1
          restore-keys: |
            ${{ runner.os }}-pacman-aur-
      - name: Cache Cargo AUR
        uses: actions/cache@v4
        with:
          path: cargo-aur-cache-${{ matrix.package }}/
          key: ${{ runner.os }}-cargo-aur-${{ matrix.package }}-${{ steps.aur-version.outputs.key || 'official' }}
          restore-keys: |
            ${{ runner.os }}-cargo-aur-${{ matrix.package }}-
      - name: Prepare Cache Dir
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p pacman-aur-cache cargo-aur-cache-${{ matrix.package }}
      - name: Build AUR package in Arch container
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p aur-out
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-aur-cache:/var/cache/pacman/pkg -v $(pwd)/cargo-aur-cache-${{ matrix.package }}:/home/builduser/.cargo -w /work ghcr.io/archlinux/archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel git sudo rust wget blueprint-compiler
            useradd -m builduser || true
            chown -R builduser:builduser /home/builduser
            passwd -d builduser
            echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser
            
            # Cek apakah paket ada di repo resmi
            if pacman -Si \"${{ matrix.package }}\" >/dev/null 2>&1; then
              echo 'Downloading pre-compiled official package and its dependencies...'
              if [ \"${{ matrix.package }}\" = \"base-devel\" ]; then
                mkdir -p /tmp/empty-db
                pacman -Sy --dbpath /tmp/empty-db >/dev/null 2>&1 || true
                URLS=\$(pacman -Sp --noconfirm --dbpath /tmp/empty-db \"${{ matrix.package }}\" | grep -E '\.pkg\.tar\.(zst|xz)')
              else
                URLS=\$(pacman -Spd --noconfirm \"${{ matrix.package }}\" | grep -E '\.pkg\.tar\.(zst|xz)')
              fi
              for u in \$URLS; do
                wget -q -P /work/aur-out/ \"\$u\"
              done
            else
              echo 'Cloning and compiling AUR package...'
              # Buat dummy .gitconfig di root dan user builduser guna mencegah kegagalan libgit2/cargo di fakeroot
              touch /root/.gitconfig
              sudo -u builduser touch /home/builduser/.gitconfig
              sudo -u builduser bash -c '
                cd ~
                git clone https://aur.archlinux.org/${{ matrix.package }}.git
                cd ${{ matrix.package }} && export GIT_CONFIG_GLOBAL=/dev/null && export GIT_CONFIG_SYSTEM=/dev/null && makepkg -s --noconfirm
              '
              cp /home/builduser/${{ matrix.package }}/*.pkg.tar.zst /work/aur-out/
            fi

            # Ganti semua karakter colon (:) pada nama file di aur-out/ agar kompatibel dengan upload-artifact
            for f in /work/aur-out/*:*; do
              [ -e \"\$f\" ] && mv \"\$f\" \"\$(echo \"\$f\" | tr ':' '_')\" || true
            done
          "
          sudo chown -R $USER:$USER aur-out/ pacman-aur-cache/ cargo-aur-cache-${{ matrix.package }}/
      - name: Upload AUR package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aur-package-${{ matrix.package }}
          path: aur-out/*.pkg.tar.zst

  build-local-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [ark-system-tweaks]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Pacman Local Build
        uses: actions/cache@v4
        with:
          path: pacman-local-cache/
          key: ${{ runner.os }}-pacman-local-v1
      - name: Cache Cargo Local Build
        uses: actions/cache@v4
        with:
          path: cargo-local-cache-${{ matrix.package }}/
          key: ${{ runner.os }}-cargo-local-${{ matrix.package }}-v1
      - name: Prepare Cache Dir
        run: |
          mkdir -p pacman-local-cache cargo-local-cache-${{ matrix.package }} aur-out
      - name: Build Local package in Arch container
        run: |
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-local-cache:/var/cache/pacman/pkg -v $(pwd)/cargo-local-cache-${{ matrix.package }}:/home/builduser/.cargo -w /work ghcr.io/archlinux/archlinux:latest bash -c "
            sed -i '/NoExtract/d' /etc/pacman.conf
            pacman -Syu --noconfirm base-devel glibc git sudo rust
            pacman -S --noconfirm glibc
            useradd -m builduser || true
            chown -R builduser:builduser /home/builduser
            passwd -d builduser
            echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser

            chown -R builduser:builduser /work/${{ matrix.package }}
            sudo -u builduser bash -c '
              cd /work/${{ matrix.package }}
              makepkg -s --noconfirm
            '
            cp /work/${{ matrix.package }}/*.pkg.tar.zst /work/aur-out/
          "
          sudo chown -R $USER:$USER aur-out/ pacman-local-cache/ cargo-local-cache-${{ matrix.package }}/
      - name: Upload Local package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-package-${{ matrix.package }}
          path: aur-out/*.pkg.tar.zst

  download-pacman-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Download all pacman packages in Arch container
        run: |
          mkdir -p pacman-cache
          sudo podman run --rm --privileged -v $(pwd)/pacman-cache:/var/cache/pacman/pkg ghcr.io/archlinux/archlinux:latest bash -c "
            mkdir -p /tmp/empty-root/var/lib/pacman
            pacman -Sy
            yes | pacman -Syw --noconfirm --cachedir /var/cache/pacman/pkg --root /tmp/empty-root \
              base glibc linux linux-zen linux-lts linux-hardened linux-headers linux-zen-headers linux-lts-headers linux-hardened-headers \
              linux-firmware networkmanager mkinitcpio gnome-shell gnome-control-center \
              gnome-keyring gnome-session gnome-settings-daemon nautilus xdg-desktop-portal-gnome xdg-user-dirs-gtk \
              gnome-console gdm gnome-software flatpak gnome-initial-setup util-linux openssl \
              efibootmgr dosfstools e2fsprogs xfsprogs ostree skopeo btrfs-progs podman composefs ibus \
              iso-codes shadow sudo git nano nvidia-open nvidia-open-dkms nvidia-utils nvidia-settings dkms
          "
          # Compress the cache folder
          tar -czf pacman-cache.tar.gz -C pacman-cache .
          # Split the tarball into 1200MB chunks to bypass GitHub Release size limit (2GB)
          split -b 1200M pacman-cache.tar.gz pacman-cache.tar.gz.part-
          rm pacman-cache.tar.gz
      - name: Upload Pacman Cache Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacman-cache-tarball
          path: pacman-cache.tar.gz.part-*

  release:
    needs: [build-aur-packages, build-local-packages, download-pacman-cache]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download AUR packages
        uses: actions/download-artifact@v4
        with:
          pattern: aur-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Download Local packages
        uses: actions/download-artifact@v4
        with:
          pattern: local-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Download Pacman cache
        uses: actions/download-artifact@v4
        with:
          name: pacman-cache-tarball
          path: pacman-cache/
      - name: Delete old release
        run: gh release delete latest --cleanup-tag -y -R ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger ark-image and ark.linux rebuilds
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::No GH_PAT secret set — skipping auto-rebuild of ark-image / ark.linux"
            echo "::warning::Create a classic PAT with repo scope, add as GH_PAT secret in repo settings"
            exit 0
          fi
          echo "Triggering ark-image rebuild..."
          gh workflow run build-payload.yml --repo zamkara/ark-image -f force=true
          echo "Triggering ark.linux ISO rebuild..."
          gh workflow run build-iso.yml --repo zamkara/ark.linux -f force=true
          echo "Done — both downstream workflows triggered"

      - name: Create Nightly Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating release..."
          gh release create latest --title "Latest Pre-built AUR Packages" --notes "Automated build for \`bootc\`, \`bootupd\`, and offline package cache." -R ${{ github.repository }} || echo "Release already exists or failed to create"
          echo "Uploading packages..."
          for f in aur-packages/*.pkg.tar.zst pacman-cache/pacman-cache.tar.gz.part-*; do
            if [ -f "$f" ]; then
              echo "Uploading $f..."
              gh release upload latest "$f" --clobber -R ${{ github.repository }}
              sleep 0.8
            fi
          done
